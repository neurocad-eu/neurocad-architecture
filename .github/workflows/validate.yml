name: Validate Architecture Docs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure critical docs exist
        run: |
          test -f README.md
          test -f docs/system-overview.md
          test -f docs/system-context.md
          test -f docs/public-private-boundary.md
          test -f docs/inference-flow.md
          test -f docs/trust-boundaries.md
